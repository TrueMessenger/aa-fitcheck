name: Publish to PyPI

# Builds and publishes the package when a version tag (e.g. v1.1.0) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — NO API token is stored in repo secrets.
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/): add a
# trusted publisher for this repository with workflow `publish.yml` and
# environment `pypi`. Until that is configured, the publish step will fail
# safely (nothing is uploaded).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
